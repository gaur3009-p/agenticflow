server {
    listen 80;
    server_name agenticflow.io www.agenticflow.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name agenticflow.io www.agenticflow.io;

    ssl_certificate     /etc/letsencrypt/live/agenticflow.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agenticflow.io/privkey.pem;

    # Frontend
    location / {
        proxy_pass http://af_frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        proxy_pass http://af_backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # WebSocket streaming
    location /api/v1/agents/ {
        proxy_pass http://af_backend:8000/api/v1/agents/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # FastAPI docs
    location /docs {
        proxy_pass http://af_backend:8000/docs;
    }
}
